<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>你的工作有多大概率被AI替代？</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">

  <!-- ── LANDING ───────────────────────────────────────── -->
  <section id="screen-landing" class="screen active">
    <div class="bg-grid"></div>
    <div class="bg-radial"></div>
    <div class="landing-inner">
      <p class="landing-eyebrow">AI 职业风险诊断</p>
      <div class="glitch-wrap">
        <h1 class="glitch-title" data-text="你的工作有多大概率被AI替代？">你的工作有多大概率被AI替代？</h1>
      </div>
      <p class="landing-sub">基于你的工作特征，沿不同路径作答，最终得出一个扎心的概率数字。</p>
      <div class="warning-strip">结果可能让你坐立难安，建议深呼吸后再开始</div>
      <br>
      <button id="btn-start" class="btn-primary">开始测试 →</button>
    </div>
  </section>

  <!-- ── QUIZ ──────────────────────────────────────────── -->
  <section id="screen-quiz" class="screen">
    <div class="quiz-topbar">
      <span class="quiz-brand">AI 风险测试</span>
      <span id="quiz-counter" class="quiz-counter">第 1 题</span>
    </div>
    <div class="quiz-content-wrap">
      <div id="quiz-content" class="quiz-content">
        <p id="question-text" class="question-text"></p>
        <div id="options-list" class="options-list"></div>
      </div>
    </div>
  </section>

  <!-- ── RESULT ─────────────────────────────────────────── -->
  <section id="screen-result" class="screen">
    <div class="result-inner">
      <p class="result-header">◈ 诊断完成</p>
      <div class="gauge-wrap">
        <svg class="gauge-svg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
          <circle class="gauge-bg-circle" cx="100" cy="100" r="80"/>
          <circle id="gauge-fill" class="gauge-fill-circle" cx="100" cy="100" r="80"/>
        </svg>
        <div class="gauge-center">
          <div class="result-sentence">
            <span class="result-sentence-pre">你有</span>
            <div class="result-number-wrap">
              <span id="result-number" class="result-number">0</span>
              <span id="result-pct" class="result-pct">%</span>
            </div>
            <span class="result-sentence-post">概率被AI替代</span>
          </div>
        </div>
      </div>
      <div id="risk-badge" class="risk-badge"></div>
      <div id="result-comment" class="result-comment-card"></div>
      <button id="btn-restart" class="btn-secondary">↩ 重新测试</button>
    </div>
  </section>

</div>

<script src="data.js"></script>
<script src="script.js"></script>
</body>
</html>
